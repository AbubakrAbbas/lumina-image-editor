<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUMINA — Image Editor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <!-- HEADER -->
      <header>
        <div class="logo">LUMINA<span>.</span></div>
        <div class="header-divider"></div>
        <div class="header-tagline">Non-destructive image editor</div>
        <div class="header-actions">
          <label for="input" class="btn btn-ghost" style="cursor: pointer">
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Open Image
          </label>
          <input type="file" id="input" accept="image/*" />
        </div>
      </header>

      <!-- CANVAS -->
      <main class="canvas-area">
        <label for="input" class="placeholder">
          <div class="placeholder-icon">
            <svg
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#5a5d6e"
              stroke-width="1.4"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <circle cx="8.5" cy="8.5" r="1.5" />
              <polyline points="21 15 16 10 5 21" />
            </svg>
          </div>
          <div class="placeholder-text">
            <strong>Drop or click to open an image</strong>
            <span>PNG · JPG · WEBP · GIF</span>
          </div>
        </label>
        <canvas id="img-canvas"></canvas>
      </main>

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">Adjustments</div>
          <div class="sidebar-subtitle">Drag sliders to edit</div>
        </div>
        <div class="filters-scroll">
          <div class="filters"></div>
        </div>
        <div class="sidebar-footer">
          <button
            class="btn btn-ghost"
            id="reset-btn"
            style="width: 100%; justify-content: center"
          >
            <svg
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="1 4 1 10 7 10" />
              <path d="M3.51 15a9 9 0 1 0 .49-4" />
            </svg>
            Reset All
          </button>
          <button
            class="btn btn-primary"
            id="download-btn"
            style="width: 100%; justify-content: center"
          >
            <svg
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Export Image
          </button>
        </div>
      </aside>
    </div>

    <script src="app.js"></script>
  </body>
</html>
